services:
  postgres:
    profiles: [local-db]
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil -d vigil"]
      interval: 4s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      AUTH_TRUST_HOST: "true"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      WAIT_FOR_DB: ${WAIT_FOR_DB:-false}
      APPLY_PG_STUB: ${APPLY_PG_STUB:-false}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: vigil
      DB_NAME: vigil
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  api:
    build:
      context: ./backend
      dockerfile: ../docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      ollama:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
